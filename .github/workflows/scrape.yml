name: Actualizar apartamentos

on:
  workflow_dispatch:
    # Permite ejecutar manualmente desde la UI de GitHub (Actions → Run workflow)

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt

      - name: Instalar dependencias Python
        run: pip install -r scraper/requirements.txt

      - name: Instalar Chromium para Playwright
        run: playwright install chromium --with-deps

      - name: Ejecutar scraper
        env:
          ML_CLIENT_ID: ${{ secrets.ML_CLIENT_ID }}
          ML_CLIENT_SECRET: ${{ secrets.ML_CLIENT_SECRET }}
        run: python scraper/scraper.py

      - name: Commit y push de datos actualizados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/apartments.json
          # Solo commitea si hay cambios reales
          if git diff --staged --quiet; then
            echo "Sin cambios en los datos. Nada que commitear."
          else
            git commit -m "chore: actualizar apartamentos $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
