<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inversiones MVD</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ─── Header ─────────────────────────────────────────────────────────────── -->
<header>
  <h1>Inversiones Montevideo</h1>
  <div class="meta">
    <span id="last-updated">Cargando...</span>
    <a href="https://github.com/chematos/inversiones/actions/workflows/scrape.yml"
       target="_blank" rel="noopener" class="btn btn-ghost" title="Ejecutar scraper en GitHub Actions">
      Actualizar en GitHub
    </a>
    <button id="btn-reload" class="btn" title="Recargar datos del JSON actual">
      Recargar
    </button>
  </div>
</header>

<!-- ─── Layout principal ────────────────────────────────────────────────────── -->
<div class="layout">

  <!-- Sidebar filtros -->
  <aside class="filters">
    <h2>Filtros</h2>

    <!-- Precio -->
    <div class="filter-section">
      <span class="filter-label">Precio</span>
      <div class="dual-range-wrap">
        <div class="dual-track"><div class="dual-fill" id="price-fill"></div></div>
        <input type="range" class="dual-input" id="price-min" min="60000" max="98000" step="1000" value="60000" />
        <input type="range" class="dual-input" id="price-max" min="60000" max="98000" step="1000" value="98000" />
      </div>
      <div class="dual-vals">
        <span id="price-min-val">U$S 60,000</span>
        <span id="price-max-val">U$S 98,000</span>
      </div>
    </div>

    <!-- Rentabilidad -->
    <div class="filter-section">
      <span class="filter-label">Rentabilidad anual</span>
      <div class="dual-range-wrap">
        <div class="dual-track"><div class="dual-fill" id="rent-fill"></div></div>
        <input type="range" class="dual-input" id="rent-min" min="0" max="15" step="0.5" value="0" />
        <input type="range" class="dual-input" id="rent-max" min="0" max="15" step="0.5" value="15" />
      </div>
      <div class="dual-vals">
        <span id="rent-min-val">0%</span>
        <span id="rent-max-val">15%</span>
      </div>
    </div>

    <!-- Gastos comunes maximos -->
    <div class="filter-section">
      <span class="filter-label">Gastos comunes maximos</span>
      <div class="range-row">
        <input type="range" id="ggcc-max" min="0" max="30000" step="500" value="30000" />
        <span class="range-val" id="ggcc-max-val">$U 30.000/mes</span>
      </div>
      <div class="toggle-row">
        <span class="toggle-label">Incluir sin dato de GGCC</span>
        <label class="toggle">
          <input type="checkbox" id="ggcc-unknown" checked />
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>

    <!-- Tipo de habitacion -->
    <div class="filter-section">
      <span class="filter-label">Tipo</span>
      <div class="checkbox-group filter-rooms">
        <div class="checkbox-item">
          <input type="checkbox" id="filter-1dorm" checked />
          <label for="filter-1dorm">1 dormitorio</label>
        </div>
        <div class="checkbox-item">
          <input type="checkbox" id="filter-mono" checked />
          <label for="filter-mono">Monoambiente</label>
        </div>
      </div>
    </div>

    <!-- Zonas -->
    <div class="filter-section">
      <span class="filter-label">Zonas</span>
      <div class="checkbox-group">
        <div class="checkbox-item">
          <input type="checkbox" class="zone-cb" id="zone-buceo" value="buceo" checked />
          <label for="zone-buceo">Buceo</label>
        </div>
        <div class="checkbox-item">
          <input type="checkbox" class="zone-cb" id="zone-malvin" value="malvin" checked />
          <label for="zone-malvin">Malvín</label>
        </div>
        <div class="checkbox-item">
          <input type="checkbox" class="zone-cb" id="zone-cordon" value="cordon" checked />
          <label for="zone-cordon">Cordón</label>
        </div>
        <div class="checkbox-item">
          <input type="checkbox" class="zone-cb" id="zone-carrasco" value="carrasco" checked />
          <label for="zone-carrasco">Carrasco</label>
        </div>
      </div>
    </div>

    <button id="btn-reset" class="btn-reset">Restablecer filtros</button>
  </aside>

  <!-- Contenido principal -->
  <main>
    <div class="results-header">
      <span id="results-count"><strong>0</strong> apartamentos</span>
      <div class="sort-row">
        <label for="sort">Ordenar por:</label>
        <select id="sort">
          <option value="score">Score (mayor primero)</option>
          <option value="rent">Rentabilidad % (mayor primero)</option>
          <option value="price-asc">Precio (menor primero)</option>
          <option value="price-desc">Precio (mayor primero)</option>
          <option value="m2">Precio/m² (menor primero)</option>
          <option value="days">Dias publicado (mas tiempo primero)</option>
        </select>
      </div>
    </div>

    <div id="cards-grid">
      <!-- Cards generadas por app.js -->
    </div>
  </main>

</div>

<script src="app.js"></script>
</body>
</html>
